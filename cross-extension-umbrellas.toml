# cross-extension-umbrellas.toml
#
# Umbrellas that span more than one shim-interface catalog.
#
# Each per-extension shim-interface repo owns its own
# `leaves.toml` and per-extension umbrellas; this file owns the
# umbrellas whose `expands_to` set reaches into multiple
# extensions and therefore cannot be validated in isolation by
# the per-extension `sql-extension-catalog-emit` binary.
#
# Schema
# ------
# The TOML shape mirrors the per-extension `leaves.toml`
# umbrella entries with two extensions:
#
#   1. `expands_to` entries may be `<extension>:<leaf-or-umbrella>`
#      qualified references (e.g. `postgis:spatio`,
#      `mobilitydb:mobilitydb_spatiotemporal_core`). Bare
#      identifiers (no colon) refer to an umbrella defined in
#      this file itself.
#   2. A top-level `extension = "cross"` marker distinguishes
#      cross-extension umbrellas from per-extension ones when a
#      multi-catalog consumer merges everything into one namespace.
#
# Consumption
# -----------
# The single-extension `sql-extension-catalog-emit` binary does
# not read this file directly — it owns exactly one
# `<extension>-catalog.toml` by design. Per-extension
# `leaves.toml` files may declare cross-extension deps of the
# form `<namespace>:<leaf-id>` and reference sibling catalogs at
# emit time via the emitter's `--sibling-catalog <path>` flag;
# the emitter validates every `<namespace>:<leaf-id>` reference
# against the sibling set and fails hard on unresolved refs
# (see the Phase 0-F review that introduced this check).
#
# The `expands_to` entries in this file — cross-extension
# umbrellas that span PostGIS, MobilityDB, and TimescaleDB
# leaves — remain outside the single-extension pipeline. A
# future multi-catalog consumer will merge per-extension
# `<extension>-catalog.toml` outputs with the umbrellas defined
# here and expose them under a unified discovery namespace.
#
# Rationale (why this file, not tool changes or duplication)
# ---------------------------------------------------------
# Approach chosen: **(b) cross-extension file consumed by a future
# tool subcommand**. The alternatives were rejected as follows:
#
#   (a) Extend the emitter to accept multiple `--db` +
#       `--hypothesis` pairs. Coupling multi-extension state into
#       every per-extension emit path breaks the emitter's clean
#       "one DB → one catalog" contract; the sibling-catalog
#       validator solves cross-ext dep validation without
#       merging emit paths.
#   (c) Duplicate the cross-extension umbrella definitions inside
#       each per-extension `leaves.toml`. The current emitter
#       silently drops unknown-namespace refs; a duplicated def
#       drifts. Kept as neither maintainable nor validatable.
#
# Option (b) keeps per-extension autonomy, single source of truth
# for each cross-extension umbrella, and lets us validate cross-
# extension deps via `--sibling-catalog` in the same emit pass.

schema_version = "1"
extension      = "cross"

# ----- Capability axis (cross-extension) -----

[[umbrella]]
id          = "spatiotemporal"
description = "Full static-spatial surface + non-spatial temporal core + MobilityDB spatiotemporal surface + trajectory analysis. The union of `postgis:spatio`, `mobilitydb:mobilitydb_temporal_core`, `mobilitydb:mobilitydb_spatiotemporal_core`, and `mobilitydb:temporal-analysis`. Everything a mobility application needs to represent, transform, and reason over moving geometries."
expands_to  = [
    "postgis:spatio",
    "mobilitydb:mobilitydb_temporal_core",
    "mobilitydb:mobilitydb_spatiotemporal_core",
    "mobilitydb:temporal-analysis",
]

# ----- Task axis (cross-extension) -----

[[umbrella]]
id          = "mobility-analysis"
description = "Trajectory-analysis job — the spatiotemporal capability surface plus MobilityDB's spatial-reasoning helpers (DBSCAN / KMeans clustering, spatiotemporal indexes, table-returning as-of / nearest / temporal-joins) and the temporal-analysis similarity kit."
expands_to  = [
    "spatiotemporal",
    "mobilitydb:temporal-analysis",
    "mobilitydb:mobilitydb_spatial_analysis",
]

# ----- Backwards-compat aliases (cross-extension) -----

[[umbrella]]
id          = "mobilitydb"
description = "Cross-extension backwards-compat alias for the monolithic `LOAD mobilitydb` surface — every MobilityDB leaf plus the underlying `postgis:spatio` surface it depends on. Equivalent to `spatiotemporal` extended with the MobilityDB I/O parsers and bitemporal surface. The per-extension `mobilitydb` alias in `mobilitydb-shim-interface/leaves-mobilitydb.toml` covers the same leaves *without* the `postgis:*` prefix; use whichever matches your consumer's loading model."
expands_to  = [
    "spatiotemporal",
    "mobilitydb:mobilitydb_io",
    "mobilitydb:mobilitydb_bitemporal",
    "mobilitydb:mobilitydb_temporal_jsonb",
]

# ----- Capability axis (TimescaleDB additions) -----

[[umbrella]]
id          = "temporal"
extension   = "cross"
kind        = "capability"
expands_to  = [
    "mobilitydb:mobilitydb_temporal_core",
    "timescaledb:timescale_core",
    "timescaledb:timescale_hypertable_mgmt",
    "timescaledb:timescale_toolkit_stats",
]
description = "Non-spatial temporal surface — MobilityDB temporal types + TimescaleDB time-series primitives + hypertable mgmt + counter/gauge stats."

[[umbrella]]
id          = "time-series-spatial"
extension   = "cross"
kind        = "capability"
expands_to  = [
    "postgis:spatio",
    "timescaledb:timescale_core",
    "timescaledb:timescale_hypertable_mgmt",
]
description = "Static geometry over time-series — PostGIS 2D vector + TimescaleDB hypertables. No moving objects."

[[umbrella]]
id          = "time-series-spatiotemporal"
extension   = "cross"
kind        = "capability"
expands_to  = [
    "postgis:spatio",
    "mobilitydb:mobilitydb_temporal_core",
    "mobilitydb:mobilitydb_spatiotemporal_core",
    "mobilitydb:temporal-analysis",
    "timescaledb:timescale_core",
    "timescaledb:timescale_hypertable_mgmt",
]
description = "Three-way union: PostGIS geometry + MobilityDB moving objects + TimescaleDB hypertables. Superset of `spatiotemporal`."

# ----- Task axis (TimescaleDB additions) -----

[[umbrella]]
id          = "mobility-tracking"
extension   = "cross"
kind        = "task"
expands_to  = [
    "postgis:spatio",
    "mobilitydb:mobilitydb_temporal_core",
    "mobilitydb:mobilitydb_spatiotemporal_core",
    "mobilitydb:temporal-analysis",
    "mobilitydb:mobilitydb_spatial_analysis",
    "timescaledb:timescale_hypertable",
    "timescaledb:timescale_continuous_agg",
    "timescaledb:timescale_policy",
]
description = "Live fleet/trajectory tracking — spatiotemporal + hypertables + continuous aggregates + retention."

# ----- Backwards-compat aliases (TimescaleDB) -----

[[umbrella]]
id          = "timescaledb"
extension   = "cross"
kind        = "compat"
expands_to  = [ "timescaledb:timescaledb" ]
description = "Cross-ext alias — TimescaleDB has no cross-ext deps, so this delegates directly to the per-ext `timescaledb` compat umbrella."
